name: Publish to npm

# Triggered by pushing a version tag, e.g.:
#   npm version patch && git push --follow-tags
#
# One-time setup required before this works — no npm token or GitHub secret needed at all:
#   1. On npmjs.com -> jsdoc-scribe package -> Settings -> "Trusted Publisher" -> select
#      "GitHub Actions" -> Organization/user: imchintoo, Repository: jsdoc-scribe,
#      Workflow filename: publish.yml, Environment: (leave blank unless you add one below).
#   2. As of npm's May 2026 policy change, you must explicitly tick which actions are
#      allowed for this trusted publisher — check "npm publish".
#   3. Until step 1/2 are done, this job will fail at the `npm publish` step with an auth
#      error — that's expected, not a bug in the workflow itself.
#
# Requires npm CLI >= 11.5.1 for OIDC trusted publishing — the explicit upgrade step below
# guards against an older npm version being bundled with the pinned Node version.
#
# Pinned to the exact minimum-required version (11.5.1) rather than `npm@latest`: a floating
# `latest` picked up a broken release whose bundled libnpmpublish required the unscoped
# `sigstore` package while npm's own package.json only shipped the newer scoped `@sigstore/*`
# packages, so `npm publish` failed with `Cannot find module 'sigstore'`. Pinning avoids
# riding a fresh, not-yet-stable npm release in CI.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for npm's OIDC-based trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure npm CLI supports trusted publishing
        run: npm install -g npm@11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Publish (provenance is automatic under trusted publishing)
        run: npm publish --access public
